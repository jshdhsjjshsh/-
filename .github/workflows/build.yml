   conn=sqlite3.connect("/sdcard/calllog.db")
   cur=conn.cursor()
   cur.execute("SELECT number,duration FROM calls ORDER BY date DESC LIMIT 50")
   c=cur.fetchall()
   conn.close()
   return "\n".join([f"{x[0]}: {x[1]}s"for x in c])
